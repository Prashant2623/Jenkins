services:
  java-maven-app:
    image: docker2624/pipeline
    ports:
      - 8080:8080
  Postgres:
    image: Postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=my-pwd 
       







    networks:
      - front-tier
      - back-tier
    configs:
      - httpd-config
    secrets:
      - server-certificate

  backend:
    image: awesome/database
    volumes:
      - db-data:/etc/data
    networks:
      - back-tier

volumes:
  db-data:
    driver: flocker
    driver_opts:
      size: "10GiB"

configs:
  httpd-config:
    external: true

secrets:
  server-certificate:
    external: true

networks:
  # The presence of these objects is sufficient to define them
  front-tier: {}
  back-tier: {}